<!DOCTYPE html>
<html>
<head>
    <title>Security Check</title>
    <style>
        body { 
            margin: 0; 
            height: 100vh; 
            background: url("/static/eye-image4.jpg") no-repeat center/cover; 
            font-family: sans-serif; 
            display:flex; 
            justify-content: center; 
            align-items: center; }

        body::before { 
            content: ""; 
            position: absolute; 
            width: 100%; 
            height: 100%; 
            background: rgba(0,0,0,0.7); }

        .lock-box { 
            position: relative; 
            z-index: 2; 
            background: rgba(255,255,255,0.1); 
            padding: 40px; 
            border-radius: 15px; 
            text-align: center; 
            color: white; 
            backdrop-filter: blur(10px); 
            border: 1px solid rgba(255,255,255,0.2); }
            
        input { 
            width: 80%; 
            padding: 12px; 
            margin: 20px 0; 
            border-radius: 5px; 
            border: none; }
            
        button { 
            background: #00bcd4; 
            color: white; 
            border: none; 
            padding: 10px 20px; 
            border-radius: 5px; 
            cursor: pointer; }
    </style>
</head>
<body>
    <div class="lock-box">
        <h2>🔒 Private Folder</h2>
        <p>Please enter your password to view records</p>
        <form method="POST">
            <input type="password" name="password" placeholder="Enter Password" required>
            <br>
            <button type="submit">Unlock Records</button>
        </form>
    </div>
</body>
</html>

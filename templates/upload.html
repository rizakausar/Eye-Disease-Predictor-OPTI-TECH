<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Upload Image</title>
  <style>
    body {
      background: url('static/eye-image4.jpg') center/cover no-repeat;
      background-color: rgba(0,0,0,0.6); 
      background-blend-mode: darken;
      height: 100vh; 
      display: flex; 
      flex-direction: column;
      justify-content: center; 
      align-items: center; 
      color: white;
    }

    .upload-box {
      background: rgba(255,255,255,0.15); 
      padding: 40px;
      border-radius: 20px; 
      text-align: center; 
      backdrop-filter: blur(5px);
    }
    
    button {
      padding: 12px 30px; 
      background: #00bcd4; 
      border: none;
      border-radius: 8px; 
      color: white; 
      font-weight: bold; 
      cursor: pointer;
    }
  </style>
</head>
<body>
  <h1>Opti-Tech</h1>
  <div class="upload-box">
    <h2>Upload Eye Image</h2>
    <form action="/predict" method="POST" enctype="multipart/form-data">
      <input type="file" name="file" accept="image/*" required><br><br>
      <button type="submit">PREDICT</button>
    </form>
  </div>
</body>
</html>
